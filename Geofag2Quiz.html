<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geofag 2 - Den Store Avslutningsquizen</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;700&display=swap');

        :root {
            --cat-0: #3b82f6;
            --cat-1: #06b6d4;
            --cat-2: #10b981;
            --cat-3: #f59e0b;
            --cat-4: #a855f7;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at top, #0f1f3d 0%, #0f172a 60%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        h1 { font-family: 'Bebas Neue', cursive; }

        /* ── Board ── */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.75rem;
        }

        /* Category headers */
        .cat-header {
            text-align: center;
            font-weight: 700;
            font-size: 1rem;
            padding: 0.75rem 0.5rem;
            border-radius: 0.5rem 0.5rem 0 0;
            letter-spacing: 0.03em;
        }
        .cat-header-0 { background: linear-gradient(135deg,#1d4ed8,#3b82f6); }
        .cat-header-1 { background: linear-gradient(135deg,#0e7490,#06b6d4); }
        .cat-header-2 { background: linear-gradient(135deg,#065f46,#10b981); }
        .cat-header-3 { background: linear-gradient(135deg,#92400e,#f59e0b); }
        .cat-header-4 { background: linear-gradient(135deg,#6b21a8,#a855f7); }

        /* Cards */
        .card-flip {
            perspective: 1000px;
            height: 100px;
        }

        .card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.5s cubic-bezier(0.4,0,0.2,1);
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .card-inner.is-flipped { transform: rotateY(180deg); }

        .card-front, .card-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .card-front {
            background-color: #1e293b;
            border: 2px solid #334155;
            font-size: 1.75rem;
            font-weight: 700;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .card-front:hover {
            background-color: #263348;
            box-shadow: 0 0 18px rgba(255,255,255,0.08);
        }

        /* Per-category value colour */
        .card-front.cat-0 { color: #93c5fd; }
        .card-front.cat-1 { color: #67e8f9; }
        .card-front.cat-2 { color: #6ee7b7; }
        .card-front.cat-3 { color: #fcd34d; }
        .card-front.cat-4 { color: #d8b4fe; }

        .card-back {
            background-color: #1e3a5f;
            border: 2px solid #3b82f6;
            color: #bfdbfe;
            transform: rotateY(180deg);
            font-size: 0.8rem;
            text-align: left;
            padding: 0.5rem;
        }

        .card-used .card-front {
            opacity: 0.2;
            cursor: default;
            pointer-events: none;
        }
        .card-used { cursor: default !important; }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            inset: 0;
            background: rgba(0,0,0,0.88);
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }

        /* ── Scoreboard ── */
        .team-card {
            background: #1e293b;
            border: 2px solid #334155;
            border-radius: 0.75rem;
            padding: 1rem;
            text-align: center;
            transition: border-color 0.3s;
        }
        .team-card:hover { border-color: #475569; }

        .team-name-input {
            background: transparent;
            border: none;
            border-bottom: 2px dashed #475569;
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            outline: none;
            padding: 2px 4px;
            transition: border-color 0.2s;
        }
        .team-name-input:focus { border-bottom-color: #60a5fa; }
        .team-name-input::placeholder { color: #64748b; }

        /* Timer ring animation */
        @keyframes pulse-red {
            0%,100% { box-shadow: 0 0 18px rgba(239,68,68,0.6); }
            50% { box-shadow: 0 0 35px rgba(239,68,68,1); }
        }
        .timer-urgent { animation: pulse-red 0.8s infinite; }

        /* Confetti */
        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            animation: confetti-fall linear forwards;
            pointer-events: none;
            z-index: 200;
        }
        @keyframes confetti-fall {
            0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="text-center mb-8">
        <h1 class="text-7xl md:text-8xl text-transparent bg-clip-text bg-gradient-to-r from-blue-400 via-cyan-300 to-blue-500 tracking-wider drop-shadow-lg">
            Geofag 2: Mestermøte
        </h1>
        <p class="text-slate-400 mt-1">Velg en kategori og poengsum – er dere klare for den ultimate avslutningen?</p>
    </header>

    <div class="max-w-7xl mx-auto">

        <!-- Controls -->
        <div class="mb-6 flex flex-wrap justify-center items-center gap-4 bg-slate-800/70 backdrop-blur p-4 rounded-xl border border-slate-700 w-fit mx-auto shadow-lg">
            <label class="text-slate-300 font-semibold">Antall lag:</label>
            <select id="teamCount" onchange="setupTeams()" class="bg-slate-900 text-white px-4 py-2 rounded border border-slate-600 outline-none focus:border-blue-500 cursor-pointer">
                <option value="2">2 lag</option>
                <option value="3" selected>3 lag</option>
                <option value="4">4 lag</option>
                <option value="5">5 lag</option>
                <option value="6">6 lag</option>
            </select>
            <button onclick="setupTeams()" class="bg-slate-700 hover:bg-slate-600 text-white px-4 py-2 rounded transition text-sm font-semibold">
                🔄 Nullstill poeng
            </button>
        </div>

        <!-- Board -->
        <div class="grid-container mb-10" id="board"></div>

        <!-- Scoreboard -->
        <div id="scoreboardContainer" class="grid gap-4" style="grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));"></div>
    </div>

    <!-- Question Modal -->
    <div id="qModal" class="modal">
        <div class="bg-slate-900 border-2 border-blue-500 p-8 rounded-2xl max-w-2xl w-full mx-4 text-center shadow-2xl">
            <h2 id="modalCategory" class="text-blue-400 uppercase tracking-widest mb-4 font-bold text-sm"></h2>

            <!-- Timer -->
            <div id="timerDisplay"
                 class="text-4xl font-mono text-white mb-6 bg-slate-800 rounded-full w-24 h-24 flex items-center justify-center mx-auto border-4 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all duration-300 select-none">
                30
            </div>

            <p id="modalQuestion" class="text-2xl md:text-3xl font-semibold mb-8 leading-snug"></p>

            <div id="answerSection" class="hidden">
                <hr class="border-slate-700 mb-6">
                <p class="text-slate-400 mb-2 font-bold uppercase text-xs tracking-widest">Fasit:</p>
                <p id="modalAnswer" class="text-xl text-green-400 mb-8 font-semibold leading-relaxed"></p>
            </div>

            <!-- Point assignment -->
            <div id="pointAssign" class="hidden mb-6">
                <p class="text-slate-300 font-semibold mb-3 text-sm uppercase tracking-wide">Hvilket lag svarte riktig?</p>
                <div id="pointBtns" class="flex flex-wrap gap-2 justify-center"></div>
            </div>

            <div class="flex flex-col md:flex-row gap-3 justify-center">
                <button id="showBtn" onclick="toggleAnswer()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg font-bold transition">Vis svar</button>
                <button onclick="closeModal()" class="bg-slate-700 hover:bg-slate-600 px-6 py-3 rounded-lg font-bold transition">Lukk og fortsett</button>
            </div>
        </div>
    </div>

    <!-- Victory overlay -->
    <div id="victoryOverlay" class="modal">
        <div class="bg-slate-900 border-2 border-yellow-400 p-10 rounded-2xl max-w-lg w-full mx-4 text-center shadow-2xl">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-5xl font-bold text-yellow-400 mb-2" style="font-family:'Bebas Neue',cursive;">Spillet er over!</h2>
            <p id="victoryText" class="text-2xl text-white mb-6"></p>
            <button onclick="document.getElementById('victoryOverlay').classList.remove('active')" class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-8 py-3 rounded-lg font-bold transition text-lg">Lukk</button>
        </div>
    </div>

    <script>
        /* ──────────────── Game data ──────────────── */
        const gameData = [
            {
                category: "Atmosfære & Vær",
                questions: [
                    { v: 100, q: "Hva kalles skyene som ofte gir kraftige regnbyger, lyn og torden?", a: "Cumulonimbus / Bygeskyer" },
                    { v: 200, q: "Hva er albedo, og hvordan påvirker det jordens strålingsbalanse?", a: "Evnen en overflate har til å reflektere solstråling. Høy albedo → mye refleksjon → mindre oppvarming." },
                    { v: 300, q: "Hvorfor blåser det vanligvis fra havet inn mot land på varme sommerdager (solgangsbris)?", a: "Land varmes opp raskere enn hav. Varm luft over land stiger og danner lokalt lavtrykk som suger inn kaldere luft fra havet." },
                    { v: 400, q: "Hva er jetstrømmer, og hvor i atmosfæren finner vi dem vanligvis?", a: "Kraftige, smale vindbånd høyt oppe i troposfæren, ofte i grensen mellom varme og kalde luftmasser (f.eks. over polarfronten)." },
                    { v: 500, q: "Hvilke to faktorer er de viktigste 'motorene' for den globale sirkulasjonen i atmosfæren?", a: "Forskjell i solinnstråling/temperatur mellom ekvator og polene, og Corioliseffekten (jordrotasjonen)." },
                    { v: 600, q: "Hva menes med troposfærens lapsrate, og hva er en temperaturinversjon?", a: "Lapsrate er det normale temperaturavtaket med høyden (~6,5 °C/km). Inversjon er det motsatte – varmere luft ligger over kaldere – stabilt, hindrer konveksjon og kan fange forurensning nær bakken." },
                    { v: 700, q: "Hva er den inter-tropiske konvergenssonen (ITCZ), og hvilken rolle spiller den for global nedbørsfordeling?", a: "Sonen nær ekvator der passatvindene møtes, varm luft stiger kraftig og gir tropiske regnskyer og store nedbørsmengder. Den vandrer med sola og styrer blant annet monsunregn." }
                ]
            },
            {
                category: "Hav & Kryosfære",
                questions: [
                    { v: 100, q: "Hva kaller vi de frosne delene av jordens overflate – isbreer, havis, snødekke og permafrost?", a: "Kryosfæren" },
                    { v: 200, q: "Hvilken kraft får havstrømmer og vinder til å bøye av mot høyre på den nordlige halvkule?", a: "Corioliseffekten" },
                    { v: 300, q: "Hvilke to fysiske egenskaper bestemmer tettheten til sjøvannet i den termohaline sirkulasjonen?", a: "Temperatur og saltholdighet" },
                    { v: 400, q: "Hvorfor synker overflatevann og danner dypvann i Norskehavet om vinteren?", a: "Vannet avkjøles og det dannes is. Det gjenværende flytende vannet blir saltere, kaldere og tyngre, og synker ned." },
                    { v: 500, q: "Forklar hva som skjer under El Niño, og hvordan det påvirker Stillehavet.", a: "Passatvindene svekkes. Varmt overflatevann som normalt presses mot vest, strømmer østover og varmer opp havet utenfor Sør-Amerika." },
                    { v: 600, q: "Hva er havforsuring, og hva er den direkte årsaken til det?", a: "Havet tar opp CO₂ fra atmosfæren. CO₂ reagerer med sjøvann og danner karbonsyre, noe som senker pH-verdien i havet." },
                    { v: 700, q: "Hva er albedo-tilbakekoblingen knyttet til arktisk havis, og hvorfor er den selvforsterkende?", a: "Når havis smelter, avdekkes mørkt hav med mye lavere albedo. Havet absorberer mer varme → smelter mer is → lavere albedo → enda mer oppvarming. En positiv (selvforsterkende) tilbakekobling." }
                ]
            },
            {
                category: "Klima i endring",
                questions: [
                    { v: 100, q: "Hvilken gass bidrar mest til den menneskeskapte forsterkningen av drivhuseffekten?", a: "Karbondioksid (CO₂)" },
                    { v: 200, q: "Hva er en 'klimaproxy'? Nevn to eksempler forskere bruker for å undersøke paleoklima.", a: "En indirekte kilde til forhistorisk klima. Eks: iskjerner, treringer, sedimentkjerner, dryppsteiner, fossilt pollen." },
                    { v: 300, q: "Hva er forskjellen på utslippsreduksjon og klimatilpasning?", a: "Utslippsreduksjon fjerner selve årsaken (klimagassene). Tilpasning er tiltak mot konsekvensene som uansett kommer (f.eks. flomvoller, endret arealbruk)." },
                    { v: 400, q: "Hvordan kan tinende permafrost skape en positiv (selvforsterkende) tilbakekobling i klimasystemet?", a: "Når permafrosten tiner, brytes organisk materiale ned og frigjør metan og CO₂ → sterkere drivhuseffekt → mer oppvarming → enda mer tining." },
                    { v: 500, q: "Hva forteller Milankovitch-syklusene oss om naturlige klimaendringer på jorda?", a: "Variasjoner i jordens bane (baneform, aksehelning og vugging) endrer solinnstrålingen over titusener av år og styrer vekslingen mellom istider og mellomistider." },
                    { v: 600, q: "Hva er karbonfangst og -lagring (CCS), og hva er de største utfordringene med teknologien?", a: "CO₂ fanges ved utslippskilden og pumpes ned i geologiske formasjoner under bakken. Utfordringer: høy kostnad, energikrevende prosess, og usikkerhet rundt langtidslagring." },
                    { v: 700, q: "Hva er 'tipping points' (vippepunkter) i klimasystemet? Gi ett eksempel og forklar hvorfor de er farlige.", a: "Terskler der klimasystemet kan bikke over i en ny, dramatisk annerledes tilstand som er vanskelig å snu. Eks: kollaps av Vest-Antarktis-isen. Farlig fordi de kan utløse kjedereaksjoner av andre vippepunkter." }
                ]
            },
            {
                category: "Naturfarer",
                questions: [
                    { v: 100, q: "Hvilken naturfare utløses ofte av langvarig regn eller brå snøsmelting og fører til at elver går over sine bredder?", a: "Flom" },
                    { v: 200, q: "Hva kalles fenomenet der lavt lufttrykk og kraftig pålandsvind presser havvannet unormalt høyt inn mot kysten?", a: "Stormflo" },
                    { v: 300, q: "Hva er et flakskred, og hvor bratt må terrenget vanligvis være for at det skal utgjøre fare for skiløpere?", a: "Et snøskred der et stort, sammenhengende flak glir oppå et svakt snølag. Terrenget er typisk 30 grader eller brattere." },
                    { v: 400, q: "Hvorfor gir smelting av innlandsisen på Grønland havnivåstigning, mens smelting av havisen i Polhavet ikke gjør det?", a: "Havis flyter allerede og fortrenger sitt eget volum. Is på land tilfører nytt vann til verdenshavene når den renner ut." },
                    { v: 500, q: "Hvilke forhold kreves for at en tropisk syklon (orkan/tyfon) skal dannes?", a: "Varmt havvann (over ~26,5 °C) og tilstrekkelig avstand fra ekvator, slik at Corioliseffekten kan gi den roterende bevegelsen." },
                    { v: 600, q: "Hva er en ROS-analyse (risiko- og sårbarhetsanalyse), og hvorfor er den viktig i naturfarearbeid?", a: "En systematisk gjennomgang av hvilke farer som finnes, sannsynligheten for at de inntreffer, og konsekvensene. Brukes til å prioritere tiltak og sikre forsvarlig arealplanlegging." },
                    { v: 700, q: "Hva er forskjellen på sannsynlighet og konsekvens i risikovurdering, og hvordan kombineres de to til et risikonivå?", a: "Sannsynlighet = hvor ofte noe skjer. Konsekvens = skadeomfanget. Risiko = sannsynlighet × konsekvens. Et sjeldent men katastrofalt hendelse kan ha samme risiko som et hyppig men lite skadelig hendelse." }
                ]
            },
            {
                category: "Energi & Felt",
                questions: [
                    { v: 100, q: "Nevn den mest utbygde fornybare energiformen i Norge som utnytter bevegelsesenergien i atmosfæren.", a: "Vindkraft" },
                    { v: 200, q: "Hva er GIS (Geografiske Informasjonssystemer), og hva brukes det til i geofag?", a: "Digitale systemer for å registrere, analysere og visualisere geografiske data lagvis. Brukes bl.a. til farekart for snøskred og flom." },
                    { v: 300, q: "Hvilken fornybar energikilde utnytter endringene i havets vannstand skapt av gravitasjonskreftene fra månen og sola?", a: "Tidevannsenergi" },
                    { v: 400, q: "Hvorfor er havvind ofte mer stabilt og effektivt enn vindkraft på land?", a: "Over havet er det mindre friksjon fra underlaget, noe som gir sterkere og jevnere vindhastigheter sammenlignet med kupert terreng på land." },
                    { v: 500, q: "Hva vil det si at utnyttelse av ressurser fra hav og atmosfære er 'bærekraftig' i et geofaglig perspektiv?", a: "At utnyttelsen dekker dagens behov uten å ødelegge miljøet, tømme ressursen eller redusere fremtidige generasjoners mulighet til å dekke sine behov." },
                    { v: 600, q: "Hva er en 'energimiks', og hvorfor er variasjon i energimiksen viktig for et lands forsyningssikkerhet?", a: "Sammensetningen av ulike energikilder i et lands energiforsyning. Variasjon reduserer avhengigheten av enkeltressurser, og er viktig for å sikre stabil forsyning ved svikt i én kilde." },
                    { v: 700, q: "Hva er geotermisk energi, og hvilke geologiske forhold gjør Island til et ideelt land for denne energiformen?", a: "Varme fra jordens indre utnyttes til oppvarming og strømproduksjon. Island ligger på den midtatlantiske ryggen (spredningsrand mellom to plater) med aktiv vulkanisme nær overflaten, noe som gir lett tilgjengelig varme." }
                ]
            }
        ];

        /* ──────────────── State ──────────────── */
        let numTeams   = 3;
        let scores     = [];
        let teamNames  = [];
        let timerInterval;
        let timeLeft   = 30;
        let currentPoints = 0;
        let totalCards = 0;
        let usedCards  = 0;

        /* ──────────────── Timer ──────────────── */
        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            const el = document.getElementById('timerDisplay');
            el.innerText = 30;
            el.className = 'text-4xl font-mono text-white mb-6 bg-slate-800 rounded-full w-24 h-24 flex items-center justify-center mx-auto border-4 border-blue-500 shadow-[0_0_15px_rgba(59,130,246,0.5)] transition-all duration-300 select-none';

            timerInterval = setInterval(() => {
                timeLeft--;
                el.innerText = timeLeft > 0 ? timeLeft : 0;
                if (timeLeft === 10) {
                    el.classList.remove('border-blue-500', 'text-white', 'shadow-[0_0_15px_rgba(59,130,246,0.5)]');
                    el.classList.add('border-red-500', 'text-red-400', 'timer-urgent', 'scale-110');
                }
                if (timeLeft <= 0) clearInterval(timerInterval);
            }, 1000);
        }

        function stopTimer() { clearInterval(timerInterval); }

        /* ──────────────── Teams ──────────────── */
        function setupTeams() {
            numTeams  = parseInt(document.getElementById('teamCount').value);
            scores    = new Array(numTeams).fill(0);
            teamNames = Array.from({ length: numTeams }, (_, i) => `Lag ${i + 1}`);
            renderScoreboard();
        }

        function renderScoreboard() {
            const container = document.getElementById('scoreboardContainer');
            container.innerHTML = '';
            for (let i = 0; i < numTeams; i++) {
                const div = document.createElement('div');
                div.className = 'team-card';
                div.innerHTML = `
                    <input type="text"
                           class="team-name-input mb-3"
                           value="${teamNames[i]}"
                           maxlength="20"
                           placeholder="Lagnavn"
                           oninput="teamNames[${i}] = this.value; updatePointBtns()">
                    <div class="text-4xl font-mono text-yellow-400 mb-4 transition-all duration-300" id="score-${i}">0</div>
                    <div class="flex justify-center gap-2">
                        <button onclick="changeScore(${i}, -currentPoints || -100)"
                                class="bg-red-700 hover:bg-red-600 px-4 py-2 rounded-lg text-lg font-bold transition w-10 leading-none">−</button>
                        <button onclick="changeScore(${i}, currentPoints || 100)"
                                class="bg-green-700 hover:bg-green-600 px-4 py-2 rounded-lg text-lg font-bold transition w-10 leading-none">+</button>
                    </div>
                `;
                container.appendChild(div);
            }
        }

        /* ──────────────── Board ──────────────── */
        function initBoard() {
            const board = document.getElementById('board');
            // Remove everything except category headers (they're added fresh each time)
            board.innerHTML = '';
            totalCards = 0;
            usedCards  = 0;

            // Headers
            gameData.forEach((cat, ci) => {
                const h = document.createElement('div');
                h.className = `cat-header cat-header-${ci}`;
                h.innerText = cat.category;
                board.appendChild(h);
            });

            // Question cards – row by row
            const numRows = gameData[0].questions.length;
            for (let row = 0; row < numRows; row++) {
                gameData.forEach((cat, ci) => {
                    const q = cat.questions[row];
                    totalCards++;
                    const wrapper = document.createElement('div');
                    wrapper.className = 'card-flip';
                    wrapper.innerHTML = `
                        <div class="card-inner" id="card-${ci}-${row}" onclick="openQuestion(${ci}, ${row})">
                            <div class="card-front cat-${ci}">${q.v}</div>
                            <div class="card-back">✓ ${q.v} poeng</div>
                        </div>
                    `;
                    board.appendChild(wrapper);
                });
            }
        }

        /* ──────────────── Modal ──────────────── */
        function openQuestion(ci, qi) {
            const card = document.getElementById(`card-${ci}-${qi}`);
            if (card.parentElement.classList.contains('card-used')) return;

            const q = gameData[ci].questions[qi];
            currentPoints = q.v;

            document.getElementById('modalCategory').innerText  = gameData[ci].category + ' – ' + q.v + ' poeng';
            document.getElementById('modalQuestion').innerText  = q.q;
            document.getElementById('modalAnswer').innerText    = q.a;
            document.getElementById('answerSection').classList.add('hidden');
            document.getElementById('pointAssign').classList.add('hidden');
            document.getElementById('showBtn').classList.remove('hidden');
            document.getElementById('qModal').classList.add('active');

            card.classList.add('is-flipped');
            card.parentElement.classList.add('card-used');
            usedCards++;

            startTimer();
        }

        function toggleAnswer() {
            document.getElementById('answerSection').classList.remove('hidden');
            document.getElementById('showBtn').classList.add('hidden');
            document.getElementById('pointAssign').classList.remove('hidden');
            updatePointBtns();
            stopTimer();
        }

        function updatePointBtns() {
            const container = document.getElementById('pointBtns');
            container.innerHTML = '';
            for (let i = 0; i < numTeams; i++) {
                const name = teamNames[i] || `Lag ${i + 1}`;
                const btn = document.createElement('button');
                btn.className = 'bg-green-700 hover:bg-green-600 px-4 py-2 rounded-lg font-semibold text-sm transition';
                btn.innerText = `✔ ${name}`;
                btn.onclick = () => { changeScore(i, currentPoints); closeModal(); };
                container.appendChild(btn);
            }
            const skipBtn = document.createElement('button');
            skipBtn.className = 'bg-slate-600 hover:bg-slate-500 px-4 py-2 rounded-lg font-semibold text-sm transition';
            skipBtn.innerText = '✘ Ingen poeng';
            skipBtn.onclick = () => closeModal();
            container.appendChild(skipBtn);
        }

        function closeModal() {
            document.getElementById('qModal').classList.remove('active');
            stopTimer();
            if (usedCards >= totalCards) showVictory();
        }

        /* ──────────────── Score ──────────────── */
        function changeScore(idx, amount) {
            scores[idx] = (scores[idx] || 0) + amount;
            const el = document.getElementById(`score-${idx}`);
            if (!el) return;
            el.innerText = scores[idx];
            el.className = `text-4xl font-mono mb-4 transition-all duration-300 ${scores[idx] < 0 ? 'text-red-400' : 'text-yellow-400'}`;
        }

        /* ──────────────── Victory ──────────────── */
        function showVictory() {
            const maxScore = Math.max(...scores);
            const winners  = [];
            for (let i = 0; i < numTeams; i++) {
                if (scores[i] === maxScore) winners.push(teamNames[i] || `Lag ${i + 1}`);
            }
            const winText = winners.length === 1
                ? `${winners[0]} vinner med ${maxScore} poeng! 🎉`
                : `Uavgjort mellom ${winners.join(' og ')} – begge med ${maxScore} poeng!`;
            document.getElementById('victoryText').innerText = winText;
            document.getElementById('victoryOverlay').classList.add('active');
            launchConfetti();
        }

        /* ──────────────── Confetti ──────────────── */
        function launchConfetti() {
            const colours = ['#f59e0b','#3b82f6','#10b981','#a855f7','#ef4444','#06b6d4'];
            for (let i = 0; i < 120; i++) {
                const el = document.createElement('div');
                el.className = 'confetti-piece';
                el.style.left            = Math.random() * 100 + 'vw';
                el.style.top             = '-20px';
                el.style.backgroundColor = colours[Math.floor(Math.random() * colours.length)];
                el.style.animationDuration = (Math.random() * 2 + 2) + 's';
                el.style.animationDelay    = (Math.random() * 1.5) + 's';
                el.style.width = el.style.height = (Math.random() * 8 + 6) + 'px';
                document.body.appendChild(el);
                el.addEventListener('animationend', () => el.remove());
            }
        }

        /* ──────────────── Init ──────────────── */
        initBoard();
        setupTeams();
    </script>
</body>
</html>
