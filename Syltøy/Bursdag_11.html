  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

px; color:#f3e9ff;\">\n        Gratulerer så mye med 11-årsdagen! 🎉 Jeg vet du har lyst til å gå på konsert —\n        og det skal du få.\n      <\u002Fdiv>\n      <div style=\"margin-top:8px; padding:18px 22px; background:rgba(255,255,255,0.08); border-radius:20px; border:1px solid rgba(255,255,255,0.15); max-width:400px;\">\n        <div style=\"font-size:19px; line-height:1.55;\">\n          Følg litt med på om artisten din kommer på turné — så tar tante deg med! 🎫\n        <\u002Fdiv>\n        <div style=\"margin-top:10px; font-size:16px; color:#ffb8e6;\">\n          Hvem hadde du mest lyst til å se? Send meg noen navn! 💌\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"font-size:30px; animation:strum 1.4s ease-in-out infinite;\">🎸<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ screen === 3 }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:relative; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:36px; text-align:center; gap:16px;\">\n      <div style=\"font-size:48px;\">👛☕️🛍️<\u002Fdiv>\n      <div style=\"font-family:'Fredoka',sans-serif; font-weight:700; font-size:28px; color:#ffd9f0;\">Og det er ikke alt!<\u002Fdiv>\n      \n      <div style=\"font-size: 19px; line-height: 1.6; max-width: 400px; color: #f3e9ff; width: 414px; height: 92px\">\n        Vi to skal ha en egen <strong style=\"color: rgb(255, 217, 240);\">tantedag<\u002Fstrong> i byen —\n        shopping, kafé, og kanskje en tur på VilVite?<\u002Fdiv><div style=\"margin-top:4px; padding:16px 24px; background:linear-gradient(135deg, rgba(255,157,226,0.18), rgba(201,163,255,0.18)); border-radius:18px; border:1px solid rgba(255,255,255,0.18); font-family:'Fredoka',sans-serif; font-size:20px; letter-spacing:.5px;\">\n        Første uken i august 📅\n      <\u002Fdiv>\n      <div style=\"margin-top:20px; font-size:19px; line-height:1.5; max-width:380px; color:#f3e9ff;\">\n        Gratulerer med dagen, kjære Live!<br>Glad i deg! 💜\n      <\u002Fdiv>\n      <div style=\"margin-top:10px; font-family:'Fredoka',sans-serif; font-size:17px; color:#ffb8e6;\">\n        Mange bursdagsklemmer fra<br>tante Elisabeth\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"position:absolute; bottom:18px; left:0; right:0; z-index:6; display:flex; justify-content:center; gap:14px;\">\n    <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"4\">\n      <div style=\"{{ d.wrapStyle }}\" onclick=\"{{ d.onClick }}\">\n        <div style=\"{{ d.style }}\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 420, &quot;height&quot;: 860}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 0,\n    burstConfetti: [],\n    fanfareOn: false,\n    gameItems: [],\n    score: 0,\n    target: 10,\n    unlocked: false,\n  };\n  _burstSeq = 0;\n  _itemSeq = 0;\n  _spawnTimer = null;\n\n  componentWillUnmount() {\n    this.stopSpawning();\n  }\n\n  startSpawning() {\n    this.stopSpawning();\n    this._spawnTimer = setInterval(() => this.spawnItem(), 650);\n  }\n\n  stopSpawning() {\n    if (this._spawnTimer) {\n      clearInterval(this._spawnTimer);\n      this._spawnTimer = null;\n    }\n  }\n\n  syncGameSpawning(screen) {\n    if (screen === 1 && !this.state.unlocked) {\n      this.startSpawning();\n    } else {\n      this.stopSpawning();\n    }\n  }\n\n  spawnItem() {\n    if (this.state.unlocked) return;\n    const id = ++this._itemSeq;\n    const left = 8 + Math.random() * 78;\n    const dur = 3.6 + Math.random() * 2.4;\n    const size = 30 + Math.random() * 14;\n    const emoji = '⭐';\n    const item = { key: id, left, dur, size, emoji };\n    this.setState((s) => ({ gameItems: [...s.gameItems, item] }));\n  }\n\n  catchItem = (key, e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState(\n      (s) => {\n        if (!s.gameItems.find((i) => i.key === key)) return null;\n        const score = s.score + 1;\n        const gameItems = s.gameItems.filter((i) => i.key !== key);\n        const unlocked = score >= s.target;\n        return { gameItems, score, unlocked };\n      },\n      () => this.syncGameSpawning(this.state.screen)\n    );\n  };\n\n  missItem = (key) => {\n    this.setState((s) => ({ gameItems: s.gameItems.filter((i) => i.key !== key) }));\n  };\n\n  hitTestAt = (x, y, e) => {\n    if (typeof document === 'undefined' || !document.elementFromPoint) return;\n    const el = document.elementFromPoint(x, y);\n    if (!el) return;\n    const starEl = el.closest ? el.closest('[data-star-key]') : null;\n    if (!starEl) return;\n    const key = Number(starEl.getAttribute('data-star-key'));\n    this.catchItem(key, e);\n  };\n\n  handleGameAreaPointerDown = (e) => {\n    this.hitTestAt(e.clientX, e.clientY, e);\n  };\n\n  handleGameAreaTouchStart = (e) => {\n    const t = e.touches && e.touches[0];\n    if (!t) return;\n    this.hitTestAt(t.clientX, t.clientY, e);\n  };\n\n  componentDidMount() {\n    this._confetti = Array.from({ length: 22 }, (_, i) => {\n      const emojis = ['🎉','💜','✨','🎸','💗'];\n      const left = Math.random() * 100;\n      const delay = Math.random() * 6;\n      const dur = 5 + Math.random() * 4;\n      const size = 14 + Math.random() * 14;\n      const emoji = emojis[i % emojis.length];\n      return {\n        key: i,\n        style: {\n          position: 'absolute',\n          left: left + '%',\n          top: '-10%',\n          fontSize: size + 'px',\n          animation: `fall ${dur}s linear ${delay}s infinite`,\n        },\n        emoji,\n      };\n    });\n    this.forceUpdate();\n  }\n\n  advance = (e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState(\n      (s) => {\n        if (s.screen === 1 && !s.unlocked) return null;\n        return { screen: Math.min(3, s.screen + 1) };\n      },\n      () => this.syncGameSpawning(this.state.screen)\n    );\n  };\n\n  prev = (e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState((s) => ({ screen: Math.max(0, s.screen - 1) }), () =>\n      this.syncGameSpawning(this.state.screen)\n    );\n  };\n\n  goTo = (i, e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    if (i > 1 && !this.state.unlocked) return;\n    this.setState({ screen: i }, () => this.syncGameSpawning(this.state.screen));\n  };\n\n  triggerConfetti = (e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    const emojis = ['🎉', '🎊', '💜', '✨', '🎸', '💗'];\n    const batchId = ++this._burstSeq;\n    const pieces = Array.from({ length: 36 }, (_, i) => {\n      const angle = (Math.random() * 360 * Math.PI) / 180;\n      const dist = 80 + Math.random() * 220;\n      const dx = Math.cos(angle) * dist;\n      const dy = Math.sin(angle) * dist - 60;\n      const rot = Math.random() * 720 - 360;\n      const dur = 1.1 + Math.random() * 0.7;\n      const size = 16 + Math.random() * 16;\n      return {\n        key: `${batchId}-${i}`,\n        emoji: emojis[i % emojis.length],\n        style: {\n          position: 'absolute',\n          left: '50%',\n          top: '45%',\n          fontSize: size + 'px',\n          transform: 'translate(-50%,-50%)',\n          animation: `burstPiece${batchId}_${i} ${dur}s cubic-bezier(.15,.7,.3,1) forwards`,\n          zIndex: 4,\n        },\n        dx, dy, rot, dur, id: `${batchId}_${i}`,\n      };\n    });\n\n    let styleTag = document.getElementById('__burst-keyframes');\n    if (!styleTag) {\n      styleTag = document.createElement('style');\n      styleTag.id = '__burst-keyframes';\n      document.head.appendChild(styleTag);\n    }\n    const kf = pieces.map((p) => `\n      @keyframes burstPiece${p.id} {\n        0% { transform: translate(-50%,-50%) translate(0,0) rotate(0deg); opacity: 1; }\n        100% { transform: translate(-50%,-50%) translate(${p.dx}px, ${p.dy}px) rotate(${p.rot}deg); opacity: 0; }\n      }`).join('\\n');\n    styleTag.appendChild(document.createTextNode(kf));\n\n    this.setState((s) => ({ burstConfetti: [...s.burstConfetti, ...pieces] }));\n    setTimeout(() => {\n      this.setState((s) => ({\n        burstConfetti: s.burstConfetti.filter((p) => !pieces.includes(p)),\n      }));\n    }, 2200);\n  };\n\n  triggerFanfare = (e) => {\n    if (e && e.stopPropagation) e.stopPropagation();\n    this.setState({ fanfareOn: true });\n    setTimeout(() => this.setState({ fanfareOn: false }), 1600);\n\n    try {\n      const ctx = new (window.AudioContext || window.webkitAudioContext)();\n      const notes = [\n        { f: 523.25, t: 0, d: 0.16 },\n        { f: 659.25, t: 0.16, d: 0.16 },\n        { f: 783.99, t: 0.32, d: 0.16 },\n        { f: 1046.5, t: 0.48, d: 0.45 },\n      ];\n      notes.forEach((n) => {\n        const osc = ctx.createOscillator();\n        const gain = ctx.createGain();\n        osc.type = 'triangle';\n        osc.frequency.value = n.f;\n        osc.connect(gain);\n        gain.connect(ctx.destination);\n        const start = ctx.currentTime + n.t;\n        gain.gain.setValueAtTime(0.0001, start);\n        gain.gain.exponentialRampToValueAtTime(0.28, start + 0.03);\n        gain.gain.exponentialRampToValueAtTime(0.0001, start + n.d);\n        osc.start(start);\n        osc.stop(start + n.d + 0.02);\n      });\n      setTimeout(() => ctx.close(), 1200);\n    } catch (err) {}\n  };\n\n  renderVals() {\n    const screen = this.state.screen;\n\n    const confetti = (this._confetti || []).map((c) => ({\n      key: c.key,\n      emoji: c.emoji,\n      style: c.style,\n    }));\n\n    const unlocked = this.state.unlocked;\n    const showRightArrow = screen < 3 && !(screen === 1 && !unlocked);\n\n    const dots = [0, 1, 2, 3].map((i) => ({\n      key: i,\n      onClick: (e) => this.goTo(i, e),\n      wrapStyle: {\n        padding: '8px',\n        cursor: i > 1 && !unlocked ? 'default' : 'pointer',\n        display: 'flex',\n        alignItems: 'center',\n      },\n      style: {\n        width: '8px',\n        height: '8px',\n        borderRadius: '50%',\n        background: i === screen ? '#ffd9f0' : 'rgba(255,255,255,0.3)',\n        opacity: i > 1 && !unlocked ? 0.35 : 1,\n        transition: 'background .3s',\n      },\n    }));\n\n    const confettiBtnStyle = {\n      display: 'flex', alignItems: 'center', gap: '6px',\n      padding: '9px 14px', borderRadius: '100px', fontSize: '13px',\n      fontFamily: \"'Fredoka',sans-serif\", fontWeight: 600, color: '#fff',\n      background: 'rgba(255,255,255,0.14)', border: '1px solid rgba(255,255,255,0.28)',\n      cursor: 'pointer', backdropFilter: 'blur(4px)',\n    };\n    const fanfareBtnStyle = { ...confettiBtnStyle };\n    const fanfareStyle = {\n      position: 'absolute', inset: 0, zIndex: 8,\n      display: 'flex', alignItems: 'center', justifyContent: 'center',\n      fontFamily: \"'Fredoka',sans-serif\", fontWeight: 700, fontSize: '38px',\n      color: '#fff', textShadow: '0 0 24px rgba(255,157,226,0.9)',\n      background: 'radial-gradient(ellipse at center, rgba(255,157,226,0.25), transparent 70%)',\n      pointerEvents: 'none', animation: 'pulseGlow 0.5s ease-in-out 2',\n    };\n\n    const gameItems = (this.state.gameItems || []).map((it) => ({\n      key: it.key,\n      emoji: it.emoji,\n      onClick: (e) => this.catchItem(it.key, e),\n      onMiss: () => this.missItem(it.key),\n      style: {\n        position: 'absolute',\n        left: it.left + '%',\n        top: 0,\n        width: (it.size + 26) + 'px',\n        height: (it.size + 26) + 'px',\n        display: 'flex',\n        alignItems: 'center',\n        justifyContent: 'center',\n        fontSize: it.size + 'px',\n        animation: `starFall ${it.dur}s linear forwards`,\n        cursor: 'pointer',\n        zIndex: 3,\n        userSelect: 'none',\n        touchAction: 'manipulation',\n      },\n    }));\n\n    return {\n      screen,\n      advance: this.advance,\n      prev: this.prev,\n      confetti,\n      dots,\n      showRightArrow,\n      unlocked,\n      score: this.state.score,\n      target: this.state.target,\n      gameItems,\n      handleGameAreaPointerDown: this.handleGameAreaPointerDown,\n      handleGameAreaTouchStart: this.handleGameAreaTouchStart,\n      burstConfetti: (this.state.burstConfetti || []).map((p) => ({ key: p.key, emoji: p.emoji, style: p.style })),\n      fanfareOn: this.state.fanfareOn,\n      fanfareStyle,\n      confettiBtnStyle,\n      fanfareBtnStyle,\n      triggerConfetti: this.triggerConfetti,\n      triggerFanfare: this.triggerFanfare,\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
